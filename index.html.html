<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangle Dilation Applet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f0e8;
    --panel:     #ede8de;
    --grid:      #d4cec2;
    --ink:       #1a1410;
    --accent:    #c84b2f;
    --accent2:   #2f6fc8;
    --image:     #2f6fc8;
    --preimage:  #c84b2f;
    --dilation:  #2a7a3b;
    --shadow:    rgba(26,20,16,0.12);
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 0;
  }

  header {
    width: 100%;
    max-width: 820px;
    padding: 18px 28px 14px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 12px 12px 0 0;
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header span {
    font-size: 0.72rem;
    opacity: 0.55;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .canvas-wrap {
    width: 100%;
    max-width: 820px;
    background: var(--panel);
    border-left: 1px solid var(--grid);
    border-right: 1px solid var(--grid);
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    cursor: default;
  }

  .controls {
    width: 100%;
    max-width: 820px;
    background: var(--ink);
    border-radius: 0 0 12px 12px;
    padding: 20px 28px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .slider-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--bg);
    opacity: 0.6;
    white-space: nowrap;
    min-width: 56px;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    background: linear-gradient(to right, var(--preimage), #888 50%, var(--image));
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--bg);
    border: 3px solid var(--ink);
    box-shadow: 0 0 0 2px var(--bg);
    cursor: grab;
    transition: transform 0.1s;
  }

  input[type=range]:active::-webkit-slider-thumb {
    cursor: grabbing;
    transform: scale(1.2);
  }

  .scale-readout {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 300;
    color: var(--bg);
    min-width: 58px;
    text-align: right;
    letter-spacing: -0.01em;
  }

  .legend {
    display: flex;
    gap: 22px;
    margin-top: 2px;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--bg);
    opacity: 0.7;
  }

  .leg-dot {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .hint {
    font-size: 0.64rem;
    color: var(--bg);
    opacity: 0.38;
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>Dilation Explorer</h1>
  <span>Geometry · Transformations</span>
</header>

<div class="canvas-wrap">
  <canvas id="c" width="820" height="500"></canvas>
</div>

<div class="controls">
  <div class="slider-row">
    <span class="slider-label">Scale k</span>
    <input type="range" id="slider" min="-30" max="30" value="10" step="1">
    <span class="scale-readout" id="readout">1.0×</span>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#c84b2f"></div>Pre-image △ABC</div>
    <div class="leg"><div class="leg-dot" style="background:#2f6fc8"></div>Image △A′B′C′</div>
    <div class="leg"><div class="leg-dot" style="background:#2a7a3b"></div>Center of Dilation P</div>
  </div>
  <div class="hint">Drag slider left (shrink / reflect) · center = no change · right = enlarge</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('slider');
const readout = document.getElementById('readout');

// Canvas logical size
const W = 820, H = 500;
canvas.width = W; canvas.height = H;

// Grid / coordinate system
const ORIGIN = { x: 280, y: 280 };   // pixel position of (0,0)
const UNIT = 40;                       // pixels per grid unit

// Pre-image triangle vertices (in grid units)
const TRI = [
  { x:  1, y:  3 },
  { x:  4, y:  3 },
  { x:  2, y:  6 },
];

// Center of dilation (in grid units)
const CENTER = { x: -1, y: 1 };

function toPixel(gx, gy) {
  return { x: ORIGIN.x + gx * UNIT, y: ORIGIN.y - gy * UNIT };
}

function drawGrid() {
  const cols = Math.ceil(W / UNIT) + 2;
  const rows = Math.ceil(H / UNIT) + 2;
  const startX = ORIGIN.x % UNIT;
  const startY = ORIGIN.y % UNIT;

  ctx.strokeStyle = '#d4cec2';
  ctx.lineWidth = 1;

  for (let i = 0; i <= cols; i++) {
    const x = startX + (i - 1) * UNIT;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let j = 0; j <= rows; j++) {
    const y = startY + (j - 1) * UNIT;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#a09880';
  ctx.lineWidth = 1.5;
  // x-axis
  ctx.beginPath();
  ctx.moveTo(0, ORIGIN.y);
  ctx.lineTo(W, ORIGIN.y);
  ctx.stroke();
  // y-axis
  ctx.beginPath();
  ctx.moveTo(ORIGIN.x, 0);
  ctx.lineTo(ORIGIN.x, H);
  ctx.stroke();

  // Tick numbers
  ctx.fillStyle = '#a09880';
  ctx.font = '10px DM Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let n = -10; n <= 10; n++) {
    if (n === 0) continue;
    const px = toPixel(n, 0);
    if (px.x > 4 && px.x < W - 4)
      ctx.fillText(n, px.x, px.y + 4);
  }
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let n = -10; n <= 10; n++) {
    if (n === 0) continue;
    const py = toPixel(0, n);
    if (py.y > 4 && py.y < H - 4)
      ctx.fillText(n, ORIGIN.x - 5, py.y);
  }
}

function drawTriangle(verts, color, alpha, labels, labelColor) {
  const pts = verts.map(v => toPixel(v.x, v.y));
  ctx.globalAlpha = alpha;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.fillStyle = color + '33';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.2;
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Vertices
  pts.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    if (labels) {
      ctx.fillStyle = labelColor || color;
      ctx.font = 'bold 13px Fraunces, serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const off = 14;
      const dx = p.x - toPixel(CENTER.x, CENTER.y).x;
      const dy = p.y - toPixel(CENTER.x, CENTER.y).y;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      ctx.fillText(labels[i], p.x + (dx/len)*off, p.y + (dy/len)*off);
    }
  });
}

function drawRays(scale) {
  const cp = toPixel(CENTER.x, CENTER.y);
  TRI.forEach((v, i) => {
    const iv = {
      x: CENTER.x + scale * (v.x - CENTER.x),
      y: CENTER.y + scale * (v.y - CENTER.y)
    };
    const ip = toPixel(iv.x, iv.y);

    // Full ray through center → pre-image → image (dashed, subtle)
    const ext = 1.8;
    const farX = cp.x + (ip.x - cp.x) * ext;
    const farY = cp.y + (ip.y - cp.y) * ext;
    const nearX = cp.x - (ip.x - cp.x) * 0.4;
    const nearY = cp.y - (ip.y - cp.y) * 0.4;

    ctx.setLineDash([5, 5]);
    ctx.strokeStyle = '#b0a898';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(nearX, nearY);
    ctx.lineTo(farX, farY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
  });
}

function drawCenter() {
  const cp = toPixel(CENTER.x, CENTER.y);
  // Outer ring
  ctx.beginPath();
  ctx.arc(cp.x, cp.y, 9, 0, Math.PI * 2);
  ctx.fillStyle = '#2a7a3b22';
  ctx.fill();
  ctx.strokeStyle = '#2a7a3b';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Inner dot
  ctx.beginPath();
  ctx.arc(cp.x, cp.y, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#2a7a3b';
  ctx.fill();
  // Label
  ctx.fillStyle = '#2a7a3b';
  ctx.font = 'bold 13px Fraunces, serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText('P', cp.x + 10, cp.y - 6);
}

function drawScaleBadge(scale) {
  // small k= label on canvas
  const bx = W - 16, by = 16;
  ctx.fillStyle = '#1a1410cc';
  ctx.beginPath();
  roundRect(ctx, bx - 84, by, 84, 28, 6);
  ctx.fill();
  ctx.fillStyle = '#f5f0e8';
  ctx.font = '12px DM Mono, monospace';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(`k = ${scale.toFixed(2)}`, bx - 8, by + 8);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function draw() {
  // Slider: -30 to 30, center=0 → scale: -3 to 3, center=1
  const raw = parseFloat(slider.value);
  // map: raw 10 → k=1.0, raw 0 → k=0.0
  const scale = raw / 10;

  readout.textContent = scale.toFixed(1) + '×';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ede8de';
  ctx.fillRect(0, 0, W, H);

  drawGrid();
  drawRays(scale);

  // Pre-image
  drawTriangle(TRI, '#c84b2f', 0.9, ['A','B','C']);

  // Image (dilated)
  const imgTri = TRI.map(v => ({
    x: CENTER.x + scale * (v.x - CENTER.x),
    y: CENTER.y + scale * (v.y - CENTER.y),
  }));
  if (Math.abs(scale) > 0.05) {
    drawTriangle(imgTri, '#2f6fc8', 0.9, ["A′","B′","C′"]);
  }

  drawCenter();
  drawScaleBadge(scale);
}

slider.addEventListener('input', draw);
draw();
</script>
</body>
</html>
